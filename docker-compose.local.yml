# =============================================================================
# LOCAL DEVELOPMENT — Databases only
# Frontend and Backend run in terminal (not in Docker)
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#
# Then in separate terminals:
#   Terminal 1 (backend):  cd backend && source venv/bin/activate && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
#   Terminal 2 (frontend): cd frontend && npm run dev
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: project-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: migration_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init_copy.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d migration_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: project-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data

volumes:
  postgres_data_local:
  redis_data_local:
