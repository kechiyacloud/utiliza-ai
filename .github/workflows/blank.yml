name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Runner Information
        run: |
          pwd
          whoami
          uname -a
      - name: Show Repository Files
        run: ls -la

      - name: Print Message
        run: echo "My first GitHub Actions pipeline is working!"
