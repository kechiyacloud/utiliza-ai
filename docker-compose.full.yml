services:

  postgres:
    image: postgres:16-alpine
    container_name: project-postgres-full
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: migration_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_full:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: project-backend-full
    env_file: ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: project-frontend-full
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  redis:
    image: redis:7-alpine
    container_name: project-redis-full
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_full:/data

  ngrok:
    image: ngrok/ngrok:latest
    container_name: project-ngrok-tunnel-full
    restart: always
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "frontend:5173"
      - "--url=nonhabitably-arabinosic-dedra.ngrok-free.dev"
    ports:
      - "4040:4040"
    depends_on:
      - frontend
      - backend
      - redis

volumes:
  postgres_data_full:
  redis_data_full:
