services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: project-backend-prod
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: project-frontend-prod
    ports:
      - "80:80"
    restart: always