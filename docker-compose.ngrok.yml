services:
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    restart: unless-stopped
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./docker/ngrok/ngrok.yml:/etc/ngrok.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4040:4040"
